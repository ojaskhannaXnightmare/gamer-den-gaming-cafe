[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.env]]
name = "DATABASE_URL"
value = "file:/app/db/custom.db"

[[deploy.env]]
name = "NODE_ENV"
value = "production"
